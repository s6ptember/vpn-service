name: CI

# Gate only. No deploy, no registry, no ssh: this stage has no CD and no test VPS, and the image
# embeds build-time secrets (see Dockerfile), so it is not a pushable artefact anyway.
on:
  pull_request:
  push:
    branches: [main]

# A superseded run answers a question nobody is asking any more.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # config.ts reads $env/static/private, which svelte-kit resolves from .env at sync and build
      # time. Without this file the variables are not exported at all and svelte-check, vitest and
      # vite build each fail on unresolved imports. .env.test holds throwaway values and selects
      # the fakes (PAYMENT_PROVIDER=fake, empty MARZBAN_API_URL), so no real secret is involved.
      - name: Provide throwaway env
        run: |
          cp .env.test .env
          # .env.test points DATABASE_PATH at ./data/app.db, and data/ is gitignored — so it does
          # not exist on a fresh runner. That is not cosmetic: container.ts opens SQLite at module
          # scope and SvelteKit's postbuild `analyse` imports the server bundle, so `vite build`
          # itself connects, and better-sqlite3 will not create the parent directory. Without this
          # line the Build step and the Playwright webServer both die with
          # "Cannot open database because the directory does not exist".
          mkdir -p data

      # chromium-headless-shell is a separate download, and it is what playwright actually launches
      # for headless runs: installing only `chromium` leaves the browser-driven tests failing with
      # "Executable doesn't exist" while the request-based ones still pass.
      - name: Install browser
        run: npx playwright install --with-deps chromium chromium-headless-shell

      # prettier --check . && eslint .
      - name: Lint
        run: npm run lint

      # svelte-kit sync && svelte-check
      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm run test:unit -- --run

      - name: Build
        run: npm run build

      # Stage-0 checklist: migrations must prove themselves on a throwaway SQLite, never on
      # anything a later step reads.
      - name: Migrations on a throwaway SQLite
        env:
          DATABASE_PATH: ${{ runner.temp }}/ci.db
        run: npm run db:migrate

      - name: Migration conflicts
        env:
          DATABASE_PATH: ${{ runner.temp }}/ci.db
        run: npm run db:check

      # Drift guard. `generate` is a no-op when drizzle/ already matches schema.ts; if it writes a
      # migration, then schema.ts changed without one and app-migrate would boot against a schema
      # the code does not expect. stdin is closed so an interactive rename prompt fails loudly
      # instead of hanging until the job timeout.
      - name: Schema drift
        env:
          DATABASE_PATH: ${{ runner.temp }}/ci.db
        run: |
          npm run db:generate < /dev/null
          if [ -n "$(git status --porcelain drizzle/)" ]; then
            echo "::error::schema.ts drifted from drizzle/. Run 'npm run db:generate' and commit the migration."
            git status --porcelain drizzle/
            exit 1
          fi

      # Playwright's webServer runs `npm run build && npm run preview`, which boots the real app:
      # hooks.server.ts calls startWorker(), and the worker hits `jobs` on its first tick. The app
      # opens whatever config.ts inlined from .env — ./data/app.db — NOT the throwaway file the
      # steps above migrate. Migrating that throwaway does nothing for it, so the preview dies with
      # "no such table: jobs" before a single test runs. Seed too: tech.md 14's journey needs plans.
      - name: Prepare E2E database
        env:
          DATABASE_PATH: ./data/app.db
        run: |
          npm run db:migrate
          npm run db:seed

      # e2e/stage0.e2e.ts covers what the skeleton claims: the reference slice, the island, the swipe
      # thresholds and the guard. tech.md 14's full journey (initData → FakePayments.simulatePaid →
      # QR) joins it as A1 and A5..A9 land.
      - name: E2E
        run: npm run test:e2e

      - name: Upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

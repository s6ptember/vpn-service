<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#101828" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<!--
			Both subsets are on every screen the app has: the interface is Russian and every price, date
			and subscription link is Latin. Preloading them takes the swap out of the first paint, which
			on a cold WebView is otherwise a visible reflow from the fallback metrics into Onest's.
			crossorigin is required even same-origin — a font is always fetched in CORS mode.
		-->
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/onest-cyrillic.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/onest-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<script src="https://telegram.org/js/telegram-web-app.js"></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap" class="bg-shell font-sans text-ink antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

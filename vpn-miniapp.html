<!-- иконки -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <symbol id="i-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .71-1.53l7-6a2 2 0 0 1 2.58 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></symbol>
  <symbol id="i-headphones" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/></symbol>
  <symbol id="i-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20a6 6 0 0 0-12 0"/><circle cx="12" cy="10" r="4"/><circle cx="12" cy="12" r="10"/></symbol>
  <symbol id="i-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></symbol>
  <symbol id="i-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></symbol>
  <symbol id="i-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="3"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></symbol>
</svg>

<div id="app" class="relative mx-auto h-[100dvh] w-full max-w-[430px] overflow-hidden bg-page md:h-[880px] md:max-h-[calc(100dvh-48px)] md:rounded-[40px] md:shadow-[0_40px_80px_-20px_rgba(0,0,0,.4)]">

  <div id="pager" class="no-scrollbar flex h-full w-full snap-x snap-mandatory overflow-x-auto overflow-y-hidden overscroll-x-contain">

    <!-- ============ ПОДДЕРЖКА ============ -->
    <section id="page-support" class="no-scrollbar h-full w-full shrink-0 snap-center overflow-y-auto overscroll-y-contain" aria-label="Поддержка">
      <div class="px-4 pb-28 pt-[max(16px,env(safe-area-inset-top))]">
        <h1 class="text-[28px] font-bold tracking-[-.02em]">Поддержка</h1>

        <h2 class="mb-2 mt-6 px-1 text-[12px] font-semibold uppercase tracking-[.06em] text-muted">Частые вопросы</h2>
        <div id="faq" class="overflow-hidden rounded-[18px] bg-white"><!-- из FAQ --></div>

        <h2 class="mb-2 mt-7 px-1 text-[12px] font-semibold uppercase tracking-[.06em] text-muted">Написать в поддержку</h2>
        <label for="ticket" class="sr-only">Сообщение</label>
        <textarea id="ticket" rows="4" maxlength="1000" spellcheck="false"
          class="w-full resize-none rounded-[18px] bg-white p-4 text-[15px] leading-relaxed text-ink placeholder:text-muted focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent-600"
          placeholder="Опишите, что случилось"></textarea>
        <p id="ticket-error" class="mt-2 hidden px-1 text-[13px] text-accent-700">Нужно хотя бы 10 символов</p>
        <button id="ticket-send" class="press mt-2.5 h-12 w-full rounded-[14px] bg-accent-600 text-[15px] font-semibold text-white">Отправить</button>
        <p class="mt-2.5 px-1 text-[13px] text-muted">Обращение уйдёт администратору в Telegram, ответ придёт в этот чат.</p>
      </div>
    </section>

    <!-- ============ ГЛАВНАЯ ============ -->
    <section id="page-home" class="no-scrollbar h-full w-full shrink-0 snap-center overflow-y-auto overscroll-y-contain" aria-label="Главная">
      <div class="px-4 pb-28 pt-[max(16px,env(safe-area-inset-top))]">
        <div id="status"><!-- из USER --></div>

        <h1 class="mt-4 text-[28px] font-bold tracking-[-.02em]">Тарифы</h1>

        <div id="plans" class="mt-4 space-y-3"><!-- из TARIFFS --></div>

        <p class="mt-4 text-center text-[13px] text-muted">Ключ придёт сразу после оплаты</p>
      </div>
    </section>

    <!-- ============ ПРОФИЛЬ ============ -->

const ITEM = 64;
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
let current = 1;

function paint() {
  const w = pager.clientWidth || 1;
  const p = Math.max(0, Math.min(2, pager.scrollLeft / w));
  const f = Math.abs(p - Math.round(p));
  pill.style.transform = `translate3d(${(p * ITEM).toFixed(2)}px,0,0) scaleX(${(1 + f * 0.24).toFixed(3)})`;

  navBtns.forEach((b, i) => {
    const d = Math.min(1, Math.abs(p - i));
    /* белый на пилюле → серый вне её */
    const c = Math.round(255 + (104 - 255) * d);
    b.style.color = `rgb(${c},${c},${Math.round(255 + (111 - 255) * d)})`;
    b.setAttribute('aria-current', Math.round(p) === i ? 'page' : 'false');
  });
  current = Math.round(p);
}

let ticking = false;
pager.addEventListener('scroll', () => {
  if (ticking) return;
  ticking = true;
  requestAnimationFrame(() => { paint(); ticking = false; });
}, { passive: true });

function goTo(i, smooth = true) {
  current = i;
  pager.scrollTo({ left: i * pager.clientWidth, behavior: smooth && !reduceMotion ? 'smooth' : 'auto' });
}

navBtns.forEach(b => b.addEventListener('click', () => { haptic(); goTo(+b.dataset.index); }));

  const pct = Math.round((s.daysLeft / s.daysTotal) * 100);
  host.innerHTML = `
    <div class="rounded-[18px] bg-white p-4">
      <div class="flex items-center justify-between gap-3">
        <p class="text-[16px] font-semibold">${esc(s.label)}</p>
        <p class="flex shrink-0 items-center gap-1.5 text-[13px] font-medium text-muted">
          <span class="size-2 rounded-full bg-accent-600" aria-hidden="true"></span>Активен
        </p>
      </div>
      <p class="mt-1 text-[14px] text-muted">Осталось ${s.daysLeft} дней · до ${esc(s.until)}</p>
      <div class="mt-3 h-1 w-full overflow-hidden rounded-full bg-line" role="img" aria-label="Осталось ${pct}% срока">
        <div class="h-full rounded-full bg-accent-600" style="width:${pct}%"></div>
      </div>

      <div class="mx-auto mt-5 w-[140px]">${QR}</div>
      <p class="mt-2.5 text-center text-[13px] text-muted">Отсканируйте в приложении</p>

      <button id="copy" class="press mt-4 flex w-full items-center gap-2 rounded-[12px] bg-ink/[.05] px-3.5 py-3 text-left" aria-label="Скопировать ссылку подписки">
        <span class="truncate font-mono text-[12px] text-muted">${esc(s.link)}</span>
        <svg class="ml-auto size-4 shrink-0 text-muted" aria-hidden="true"><use href="#i-copy"/></svg>
      </button>

      <div class="mt-2 grid grid-cols-2 gap-2">
        <button data-goto="1" class="press h-11 rounded-[12px] bg-ink/[.05] text-[14px] font-medium">Продлить</button>
        <button data-goto="0" class="press h-11 rounded-[12px] bg-ink/[.05] text-[14px] font-medium">Как настроить</button>
      </div>
    </div>`;

  $('#copy').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(s.link);
    } catch (e) {
      const ta = document.createElement('textarea');
      ta.value = s.link;
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.append(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
    haptic();
    toast('Ссылка скопирована');
  });
}

function renderHistory() {
  $('#history').innerHTML = USER.history.map((h, i) => `
    <div class="flex items-center gap-3 px-4 py-3 ${i ? 'border-t border-line' : ''}">
      <div class="min-w-0 flex-1">
        <p class="text-[15px] font-medium leading-tight">${esc(h.label)}</p>
        <p class="mt-0.5 truncate text-[13px] text-muted">${esc(h.date)}${h.note ? ' · ' + esc(h.note) : ''}</p>
      </div>
      <p class="shrink-0 text-[15px] font-medium tabular-nums">${money(h.price)}</p>
    </div>`).join('');
}

$('#promo-apply').addEventListener('click', () => {
  const input = $('#promo');
  const msg = $('#promo-msg');
  const code = input.value.trim().toUpperCase();
  const hit = PROMOS.find(p => p.code === code);
  msg.classList.remove('hidden');

  if (hit) {
    msg.textContent = `Скидка ${hit.off}% применится при оплате`;
    msg.className = 'mt-2 px-1 text-[13px] font-medium text-accent-700';
    input.value = hit.code;
    haptic('medium');
  } else {
    msg.textContent = code ? 'Такого промокода нет' : 'Введите код';
    msg.className = 'mt-2 px-1 text-[13px] text-muted';
    haptic('rigid');
  }
});
$('#promo').addEventListener('keydown', e => { if (e.key === 'Enter') $('#promo-apply').click(); });

/* ===================== Telegram ===================== */
function initTelegram() {
  const tg = window.Telegram?.WebApp;
  if (!tg) return;
  tg.ready();
  tg.expand?.();
  tg.disableVerticalSwipes?.();
  tg.setHeaderColor?.('#F2F2F6');
  tg.setBackgroundColor?.('#F2F2F6');

  const u = tg.initDataUnsafe?.user;
  if (!u) return;
  $('#p-name').textContent = u.first_name || USER.name;
  $('#p-username').textContent = u.username ? '@' + u.username : 'ID ' + u.id;
  if (u.photo_url) $('#avatar').innerHTML = `<img src="${esc(u.photo_url)}" alt="" class="size-full object-cover">`;
  else $('#avatar').textContent = (u.first_name || 'A').charAt(0).toUpperCase();
}

/* ===================== старт ===================== */
renderStatus();
renderPlans();
renderFaq();
renderSubscription();
renderHistory();
$('#p-name').textContent = USER.name;
$('#p-username').textContent = '@' + USER.username;
$('#avatar').textContent = USER.name.charAt(0);

requestAnimationFrame(() => { goTo(1, false); paint(); });
window.addEventListener('load', () => { goTo(current, false); paint(); });
initTelegram();
</script>
</body>
</html>
